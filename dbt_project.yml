name: "pipeline_demo"
version: "1.0.0"
config-version: 2

profile: "pipeline_demo"

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests/dbt"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  pipeline_demo:
    staging:
      +materialized: view
      +schema: staging
      +tags: ["staging"]
    marts:
      +materialized: table
      +schema: marts
      +tags: ["marts"]

vars:
  # Date range for incremental processing. Override at runtime:
  #   dbt run --vars '{"start_date": "2024-01-01", "end_date": "2024-01-31"}'
  start_date: "2018-01-01"
  end_date: "2018-12-31"
